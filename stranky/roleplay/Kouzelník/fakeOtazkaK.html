<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situace Kouzelník</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../../styleF.css">
    <script src="../../../backend/server.js" defer></script>
    <script src="/js/quiz.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
    <form method="POST" action="/save-answer" id="quizForm">
        <div class="container ">
            <div class="row justify-content-center">
                <div class="col">
                    <div class="obrazek">
                        <img src="">
                    </div>
                    <div class="text d-flex justify-content-center align-items-center text-center">
                        <p>V troskách prastaré věže najdete Grimoár (knihu kouzel), který obsahuje absolutní vědění. Studium této knihy vám umožní ovládnout síly, o kterých jiní jen sní. Cenou je však vaše minulost: každé velké kouzlo, které se naučíte, vám navždy vymaže jednu vzpomínku na vaše dětství a vaše blízké.</p></div>
                        <div class="odpoved d-flex flex-column text-left">
                            <input type="radio" class="btn-check" id="opt1" name="KoF" value="+" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt1">
                                <p>Knihu rituálně spálím, aby nikdo (včetně mě) nemusel obětovat svou lidskost výměnou za takovou moc.</p>
                            </label>
                            <input type="radio" class="btn-check" id="opt2" name="KoF" value="0" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt2">
                                <p>Knihu uschovám na bezpečné místo, abych ji mohl studovat pouze teoreticky, bez praktického používání kouzel.</p>
                            </label>
                            <input type="radio" class="btn-check" id="opt3" name="KoF" value="-" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt3">
                                <p>Začnu se z knihy učit všechna mocná kouzla a přijmu fakt, že mé vzpomínky postupně zmizí výměnou za neomezenou moc.</p>
                            </label>
                        </div>
                    </div>
                    <div class="tlacitko row justify-content-center align-items-center text-center">
                        <button type="button" class="btn btn-primary btn-lg px-5" onclick="saveAndNext('../vyber.html')">Dokončit</button>
                    </div>
                     <div class="tlacitko row justify-content-center align-items-center text-center">
                        <button type="button" class="btn btn-primary btn-lg px-5" onclick="saveAndNext('6otazkaK.html')">Předchozí</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</body>
</html>
