<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situace Kouzelník</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../../styleF.css">
    <script src="../../../backend/server.js" defer></script>
    <script src="/js/quiz.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
    <form method="POST" action="/save-answer" id="quizForm">
        <div class="container ">
            <div class="row justify-content-center">
                <div class="col">
                    <div class="obrazek">
                        <img src="">
                    </div>
                    <div class="text d-flex justify-content-center align-items-center text-center">
                        <p>Procházíte opuštěnou stezkou, když ucítíte kouř. Za zatáčkou leží převrácený kupecký vůz v plamenech. Pod rozbitým kolem je zaklíněný zraněný obchodník a sténá. Z dálky slyšíte hlasy – blíží se bandité, kteří vůz před chvílí přepadli.</p></div>
                        <div class="odpoved d-flex flex-column text-left">
                            <input type="radio" class="btn-check" id="opt1" name="Ko1" value="+" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt1">
                                <p>Seslu mrazivé kouzlo k uhašení ohně a pomocí telekineze nadzvednu vůz, abych obchodníka vyprostil.</p>
                            </label>
                            <input type="radio" class="btn-check" id="opt2" name="Ko1" value="0" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt2">
                                <p>Vyčaruji kolem sebe neviditelnou bariéru a zkoumám magické stopy v okolí. Do dění u vozu nezasahuji.</p>
                            </label>
                            <input type="radio" class="btn-check" id="opt3" name="Ko1" value="-" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt3">
                                <p>Pomocí magie si k sobě přitáhnu obchodníkovu truhlu se zlatem a pokračuji v cestě.</p>
                            </label>
                        </div>
                    </div>
                    <div class="tlacitko row justify-content-center align-items-center text-center">
                        <button type="button" class="btn btn-primary btn-lg px-5" onclick="saveAndNext('2otazkaK.html')">Další</button>
                    </div>
                    <div class="tlacitko row justify-content-center align-items-center text-center">
                        <button type="button" class="btn btn-primary btn-lg px-5" onclick="saveAndNext('../vyber.html')">Zpět</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</body>
</html>
