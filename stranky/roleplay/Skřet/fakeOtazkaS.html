<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situace Skřet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../../styleF.css">
    <script src="../../../backend/index.js" defer></script>
    <script src="/js/quiz.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
    <form method="POST" action="/save-answer" id="quizForm">
        <div class="container ">
            <div class="row justify-content-center">
                <div class="col">
                    <div class="obrazek">
                        <img src="../../../obrázky/FSituaceSkret.jpg " alt="Situace F Skřet">
                    </div>
                    <div class="text d-flex justify-content-center align-items-center text-center">
                        <p>Podařilo se vám ukrást „Univerzální klíč“, který otevře jakoukoli pokladnici světa. Pokud ho použijete, zajistíte svému klanu bohatství na generace dopředu. Klíč je však očarovaný: jakmile se dotkne zámku, vyšle signál lovcům lidí, kteří okamžitě najdou a vypálí vaši rodnou osadu.</p></div>
                        <div class="odpoved d-flex flex-column text-left">
                            <input type="radio" class="btn-check" id="opt1" name="SoF" value="+" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt1">
                                <p>Klíč zničím nebo ho zahodím do propasti, aby nikdo nemohl ohrozit bezpečí mého klanu.</p>
                            </label>
                            <input type="radio" class="btn-check" id="opt2" name="SoF" value="0" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt2">
                                <p>Klíč si nechám u sebe jako trofej, ale nikdy ho nepoužiju k otevření žádné pokladnice</p>
                            </label>
                            <input type="radio" class="btn-check" id="opt3" name="SoF" value="-" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt3">
                                <p>Klíč použiju k vykradení královské kasy a s lupem uteču pryč, zatímco lovci zničí mou starou osadu.</p>
                            </label>
                        </div>
                    </div>
                    <div class="tlacitko row justify-content-center align-items-center text-center">
                        <button type="button" class="btn btn-primary btn-lg px-5" onclick="saveAndNext('6otazkaS.html')">Další</button>
                    </div>
                    <div class="tlacitko row justify-content-center align-items-center text-center">
                        <button type="button" class="btn btn-primary btn-lg px-5" onclick="saveAndNext('5otazkaS.html')">Předchozí</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</body>
</html>
