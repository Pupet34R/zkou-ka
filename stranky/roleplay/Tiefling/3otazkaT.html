    <form method="POST" action="/save-answer" id="quizForm">
        <div class="container ">
            <div class="row justify-content-center">
                <div class="col">
                    <div class="obrazek">
                        <img src="">
                    </div>
                    <div class="text d-flex justify-content-center align-items-center text-center">
                        <p>Procházíte blátivou cestou na okraji starého bojiště. V bahně zahlédnete zdobený kožený váček. Uvnitř je zlato a pečetní prsten rytíře, který vás před lety neprávem nechal uvěznit. Je to žold pro jeho muže; pokud ho rytíř nedostane zpět, ztratí svou čest a postavení.</p></div>

                            </label>
                            <input type="radio" class="btn-check" id="opt3" name="odpoved31" value="3" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg px-4 py-3" for="opt3">

                            </label>
